<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="#0a3a2f"/>

  <!-- Ipê flower: 5 petals in radial 72° pattern (gold on green) -->
  <g transform="translate(256 256)">
    <!-- petals -->
    <g fill="#f3c969">
      <ellipse cx="0" cy="-92" rx="58" ry="90"/>
      <ellipse cx="0" cy="-92" rx="58" ry="90" transform="rotate(72)"/>
      <ellipse cx="0" cy="-92" rx="58" ry="90" transform="rotate(144)"/>
      <ellipse cx="0" cy="-92" rx="58" ry="90" transform="rotate(216)"/>
      <ellipse cx="0" cy="-92" rx="58" ry="90" transform="rotate(288)"/>
    </g>
    <!-- inner ring (negative space carve) -->
    <circle r="42" fill="#0a3a2f"/>
    <circle r="22" fill="#f3c969"/>
  </g>
</svg>
