# Render Blueprint for the IPE Store backend.
# Connect this repo at https://dashboard.render.com/blueprints — Render reads this
# file and provisions the service automatically. Set env vars in the dashboard.
services:
  - type: web
    name: ipe-store-api
    runtime: node
    plan: starter            # bump to standard before traffic shows up
    rootDir: .
    buildCommand: npm install
    startCommand: npm --workspace server run start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: PORT
        value: 10000          # Render injects PORT — server reads env.PORT
      - key: DISABLE_INDEXER
        value: "true"         # gateway-only deploy doesn't need it
      # Set the rest in the Render dashboard:
      # DATABASE_URL, ADMIN_JWT_SECRET, ADMIN_INITIAL_EMAIL, ADMIN_INITIAL_PASSWORD,
      # SHIPPING_ENCRYPTION_KEY, MERCADOPAGO_ACCESS_TOKEN, MERCADOPAGO_WEBHOOK_SECRET,
      # NOWPAYMENTS_API_KEY, NOWPAYMENTS_IPN_SECRET, RESEND_API_KEY, RESEND_FROM_EMAIL,
      # ADMIN_NOTIFICATION_EMAIL, PUBLIC_API_URL, PUBLIC_APP_URL, IPE_TOKEN_ADDRESS,
      # USDC_TOKEN_ADDRESS, IPE_MARKET_ADDRESS.
